name: Deploy multilingual mdBook to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.5.3
      MDBOOK_I18N_HELPERS_VERSION: 0.4.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
          key: cargo-${{ runner.os }}-mdbook-${{ env.MDBOOK_VERSION }}-i18n-${{ env.MDBOOK_I18N_HELPERS_VERSION }}

      - name: Install mdBook + i18n helpers
        run: |
          if ! command -v mdbook >/dev/null; then
            cargo install --version ${MDBOOK_VERSION} mdbook
          fi
          if ! command -v mdbook-gettext >/dev/null; then
            cargo install --version ${MDBOOK_I18N_HELPERS_VERSION} mdbook-i18n-helpers
          fi

      - name: Install gettext (msgmerge, msginit)
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build UZ (default)
        run: mdbook build -d book

      - name: Build RU
        run: MDBOOK_BOOK__LANGUAGE=ru mdbook build -d book/ru

      - name: Build EN
        run: MDBOOK_BOOK__LANGUAGE=en mdbook build -d book/en

      - name: Fix canonical URLs (.md → .html, /index.html → /)
        run: |
          ./scripts/fix-canonical-urls.sh book
          ./scripts/fix-canonical-urls.sh book/ru
          ./scripts/fix-canonical-urls.sh book/en

      - name: Generate multilingual sitemap
        run: python3 scripts/generate-sitemap.py

      - name: Create robots.txt
        run: |
          cat > book/robots.txt <<'EOF'
          User-agent: *
          Allow: /
          Sitemap: https://backendtoml.milliytech.uz/sitemap.xml
          EOF

      - name: Add CNAME for custom domain
        run: echo "backendtoml.milliytech.uz" > book/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
