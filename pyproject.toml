    "onnxruntime-gpu>=1.18",
]

# -------- Frontend / Demo --------
demo = [
    "streamlit>=1.39",
    "gradio>=5.5",
    "plotly>=5.24",
]

# -------- Dev / Test tools --------
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "pytest-benchmark>=4.0",
    "ruff>=0.7",
    "mypy>=1.11",
    "black>=24.10",
    "pre-commit>=3.8",
    "nbstripout>=0.7",
]

# ============================================================
# uv konfiguratsiyasi
# ============================================================

[tool.uv]
# Default'da barcha dev tool'lar o'rnatiladi `uv sync` paytida
default-groups = ["dev"]

# Lock fayl uchun — barcha platformalar uchun resolve qiladi
# (`uv lock` chaqirilganda)
environments = [
    "sys_platform == 'darwin' and platform_machine == 'arm64'",  # Mac M-chip
    "sys_platform == 'darwin' and platform_machine == 'x86_64'", # Mac Intel
    "sys_platform == 'linux' and platform_machine == 'x86_64'",  # Linux
    "sys_platform == 'win32' and platform_machine == 'AMD64'",   # Windows
]

# Conflicting groups — bir vaqtda ham PyTorch'dan keng, ham TF'dan keng
# foydalanmaslik mumkin (memory katta). Lekin texnik jihatdan mumkin —
# istalsa quyidagini uncomment qiling:
# conflicts = [
#     [
#         { group = "month-03" },
#         { group = "tf-extras" },
#     ],
# ]

# PyTorch uchun CPU index (lokal default)
# CUDA versiya o'rnatish uchun pastdagi `[[tool.uv.index]]` ni
# uncomment qilib `--extra-index-url` orqali manual o'rnatish
# yoki `tool.uv.sources` orqali platform-specific source berish

# CUDA 12.1 (NVIDIA) uchun PyTorch — Linux/Windows
# Mac M-chip uchun default install MPS bilan ishlaydi
[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu121"
url = "https://download.pytorch.org/whl/cu121"
explicit = true

# Default'da Mac uchun MPS, boshqalar uchun CPU
# CUDA xohlasangiz, terminal'da:
#   uv sync --group month-03 --index pytorch-cu121
# yoki tool.uv.sources orqali platform marker bilan belgilang

# ============================================================
# Ruff (linter + formatter) konfiguratsiyasi
# ============================================================

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["notebooks/**/*.ipynb"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
]
ignore = [
    "E501",  # line too long (formatter handles it)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ============================================================
# Pytest konfiguratsiyasi
# ============================================================

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
]
asyncio_mode = "auto"

# ============================================================
# Mypy konfiguratsiyasi
# ============================================================

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
disallow_untyped_defs = false
warn_return_any = true
warn_unused_configs = true
exclude = ["notebooks/", "book/"]
