# ============================================================
# Backend to ML — 6 oylik Roadmap
# ============================================================
# Package manager: uv (https://docs.astral.sh/uv/)
# Python: 3.11+
#
# Tezkor boshlash:
#   uv sync                          # core paketlar
#   uv sync --group month-01         # 1-oy uchun
#   uv sync --all-groups             # barcha 6 oy + extras
#
# Notebook ishga tushirish:
#   uv run jupyter lab
#
# Yangi paket qo'shish:
#   uv add pandas                    # core'ga
#   uv add --group month-05 openai   # specific group'ga
# ============================================================

[project]
name = "backend-to-ml"
version = "0.1.0"
description = "Backend Python developer uchun 6 oylik ML / MLOps roadmap"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Jakhangir Hakimjonov" },
]

# Core paketlar — har doim kerak (har oyda ishlatiladi)
dependencies = [
    "numpy>=1.26",
    "pandas>=2.1",
    "matplotlib>=3.8",
    "seaborn>=0.13",
    "jupyter>=1.0",
    "jupyterlab>=4.0",
    "ipywidgets>=8.0",
    "tqdm>=4.66",
    "python-dotenv>=1.0",
]

# ============================================================
# Dependency groups (PEP 735) — uv 0.5+ ishlaydi
# Faqat kerakli oyni o'rnating: uv sync --group month-XX
# ============================================================

[dependency-groups]

# -------- Oy 1: Foundations --------
month-01 = [
    "scipy>=1.11",
    "sympy>=1.12",
    "missingno>=0.5",
    "ydata-profiling>=4.6",
]

# -------- Oy 2: Klassik ML --------
month-02 = [
    "scikit-learn>=1.4",
    "xgboost>=2.0",
    "lightgbm>=4.1",
    "catboost>=1.2",
    "imbalanced-learn>=0.11",
    "optuna>=3.5",
    "category-encoders>=2.6",
    "feature-engine>=1.6",
    "shap>=0.44",
    "yellowbrick>=1.5",
    "joblib>=1.3",
]

# -------- Oy 3: Deep Learning --------
month-03 = [
    "torch>=2.4",
    "torchvision>=0.19",
    "torchaudio>=2.4",
    "wandb>=0.16",
    "tensorboard>=2.15",
    "albumentations>=1.3",
    # TensorFlow/Keras ixtiyoriy — tf-extras group'ga qo'shildi
]

# TensorFlow/Keras alohida (PyTorch'dan tashqari foydalanmoqchi bo'lsangiz)
tf-extras = [
    "tensorflow>=2.15",
    "keras>=3.0",
]

# -------- Oy 4: Computer Vision + NLP --------
month-04 = [
    # CV
    "opencv-python>=4.9",
    "opencv-contrib-python>=4.9",
    "pillow>=10.0",
    "timm>=0.9",
    "ultralytics>=8.1",
    "supervision>=0.16",
    "mediapipe>=0.10",
    "easyocr>=1.7",
    "paddleocr>=2.7",
    "paddlepaddle>=2.5",
    # NLP
    "nltk>=3.8",
    "spacy>=3.7",
    "textblob>=0.18",
    "gensim>=4.3",
    "langdetect>=1.0",
    "ftfy>=6.1",
    "emoji>=2.10",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
    "unidecode>=1.3",
    # Transformers
    "transformers>=4.45",
    "sentence-transformers>=3.0",
    "datasets>=2.18",
    "tokenizers>=0.19",
    "accelerate>=0.30",
]

# -------- Oy 5: LLM, RAG, Agentlar --------
month-05 = [
    # LLM provayderlar
    "openai>=1.55",
    "anthropic>=0.40",
    "google-generativeai>=0.7",
    "groq>=0.10",
    # Structured output
    "instructor>=1.3",
    "pydantic-ai>=0.0.13",
    "litellm>=1.50",
    # LangChain ekosistema
    "langchain>=0.3",
    "langchain-openai>=0.2",
    "langchain-anthropic>=0.2",
    "langchain-community>=0.3",
    "langchain-core>=0.3",
    "langgraph>=0.2",
    "langsmith>=0.1",
    "langfuse>=2.50",
